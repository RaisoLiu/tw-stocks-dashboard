name: Daily Stock Scan

# Runs the screener on a schedule and commits web/data.json. GitHub Pages
# (Settings → Pages → Deploy from a branch → / root) then serves the updated
# dashboard at  https://<user>.github.io/<repo>/web/
#
# This replaces the old in-script `/tmp/git-creds.txt` token hack: the commit
# uses the built-in GITHUB_TOKEN, scoped by `permissions:` below.

on:
  schedule:
    # 22:00 UTC on weekdays = 06:00 (TW, next day) — late enough that the day's
    # 三大法人 (T86) and 融資 (MI_MARGN) data have all published. Adjust as needed.
    - cron: "0 22 * * 1-5"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

# Don't let a slow run overlap the next scheduled one.
concurrency:
  group: daily-scan
  cancel-in-progress: false

permissions:
  contents: write   # needed to commit web/data.json back to the repo

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Persist the throttled T86 cache between runs so we don't re-fetch
      # months of 三大法人 history (3.5s/day) on every run.
      - name: Restore T86 cache
        uses: actions/cache@v4
        with:
          path: data/t86
          key: t86-${{ github.run_id }}
          restore-keys: |
            t86-

      - name: Run screener
        run: python -m screener

      - name: Publish data.json
        run: |
          # Keep the last-good file if the scan produced no stocks.
          if ! python -c "import json,sys; sys.exit(0 if json.load(open('web/data.json')).get('stocks') else 1)"; then
            echo "::warning::scan produced 0 stocks — keeping last-good data.json"
            git checkout -- web/data.json
            exit 0
          fi
          if git diff --quiet -- web/data.json; then
            echo "data.json unchanged — nothing to publish"
            exit 0
          fi
          git config user.name "stock-screener-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data.json
          git commit -m "chore: update data.json ($(date -u +%F))"
          git push
